<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Mu - Media Pembelajaran Fikih</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mengatur variabel warna agar konsisten */
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg-light: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-light); }

        /* TAMPILAN BERANDA UTAMA (HERO) */
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://i.ibb.co.com/ZzC9mpJC/10.png'); /* Link langsung gambar utama */
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-text h1 { font-size: 3rem; margin: 0; }
        .hero-text p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

        /* TAMPILAN PROFIL KELOMPOK */
        .team-container {
            padding: 50px 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        .team-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .member-card {
            background: white;
            width: 240px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .member-card:hover { transform: translateY(-10px); }

        /* Styling Gambar Profil agar Bulat */
        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 15px;
            overflow: hidden;
            border: 4px solid var(--accent);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-belajar {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-belajar:hover { background: #219150; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Gen-Mu</a>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="belajar.html">Materi</a>
            </div>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="hero-text">
            <h1>Gen-Mu</h1>
            <p>Generasi Muhammadiyah: Cerdas, Kreatif, Berakhlak</p>
            <a href="belajar.html" class="btn-belajar">Mulai Belajar Sekarang</a>
        </div>
    </header>

    <section class="team-container">
        <h2>Tim Pengembang</h2>
        <div class="team-grid">
            
            <div class="member-card">
                <div class="photo-frame">
                    <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Profil 1">
                </div>
                <h3>Nama Anggota 1</h3>
                <p>NIM / Peran</p>
            </div>

            <div class="member-card">
                <div class="photo-frame">
                    <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Profil 2">
                </div>
                <h3>Nama Anggota 2</h3>
                <p>NIM / Peran</p>
            </div>

            <div class="member-card">
                <div class="photo-frame">
                    <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Profil 3">
                </div>
                <h3>Nama Anggota 3</h3>
                <p>NIM / Peran</p>
            </div>

        </div>
    </section>

    <footer style="background: var(--primary); color: white; text-align: center; padding: 30px; margin-top: 50px;">
        <p>&copy; 2026 Tim Gen-Mu Yogyakarta</p>
    </footer>

</body>
</html>

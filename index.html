<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Mu - Media Pembelajaran Fikih</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --warna-utama: #2c3e50;
            --warna-aksen: #27ae60;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f7f6; }

        /* Hero Section (Gambar Utama) */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://i.ibb.co.com/ZzC9mpJC/10.png'); /* Menggunakan gambar penutup bab 4 sebagai hero */
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            border-radius: 0 0 30px 30px;
        }

        .hero-content h1 { font-size: 3rem; margin: 0; }
        .hero-content p { font-size: 1.2rem; opacity: 0.9; }

        /* Team Section */
        .team-section { padding: 50px 20px; text-align: center; }
        .team-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .team-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 220px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Profile Image Styling */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--warna-aksen);
            margin-bottom: 15px;
            background-color: #eee; /* Placeholder warna jika gambar belum ada */
        }

        .btn-start {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 35px;
            background: var(--warna-aksen);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-start:hover { transform: scale(1.05); background: #219150; }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="hero-content">
            <h1>Selamat Datang di Gen-Mu</h1>
            <p>Media Pembelajaran Fikih Interaktif untuk MI</p>
            <a href="belajar.html" class="btn-start">Mulai Belajar</a>
        </div>
    </header>

    <section class="team-section">
        <h2>Tim Pengembang Kelompok</h2>
        <div class="team-grid">
            
            <div class="team-card">
                <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Foto Anggota" class="profile-img">
                <h3>Anggota 1</h3>
                <p>NIM Anda</p>
            </div>

            <div class="team-card">
                <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Foto Anggota" class="profile-img">
                <h3>Anggota 2</h3>
                <p>NIM Anda</p>
            </div>

            <div class="team-card">
                <img src="https://i.ibb.co.com/mr6DtVqV/macam-macam-shalat-6.png" alt="Foto Anggota" class="profile-img">
                <h3>Anggota 3</h3>
                <p>NIM Anda</p>
            </div>

        </div>
    </section>

    <footer style="text-align: center; padding: 30px; background: #2c3e50; color: white; margin-top: 50px;">
        <p>&copy; 2026 Gen-Mu - Universitas di Yogyakarta</p>
    </section>

</body>
</html>
